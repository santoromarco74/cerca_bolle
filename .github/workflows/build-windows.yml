name: Pacchetto Windows

on:
  workflow_dispatch:
  push:
    branches:
      - claude/progetto-documento-partenza-4izfcd
    paths:
      - "app_bolle.py"
      - "cerca_bolle.py"
      - "bolle_core.py"
      - "requirements.txt"
      - ".github/workflows/build-windows.yml"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installa le dipendenze Python
        run: |
          pip install -r requirements.txt pyinstaller

      - name: Installa Tesseract OCR (Chocolatey) + lingua italiana
        shell: pwsh
        run: |
          choco install tesseract -y --no-progress
          $tessdata = "C:\Program Files\Tesseract-OCR\tessdata"
          Invoke-WebRequest -Uri "https://github.com/tesseract-ocr/tessdata_fast/raw/main/ita.traineddata" -OutFile "$tessdata\ita.traineddata"
          & "C:\Program Files\Tesseract-OCR\tesseract.exe" --list-langs

      - name: Compila app_bolle (web)
        run: >
          pyinstaller --onedir --noconfirm --name ArchivioBolleWeb
          --collect-all uvicorn
          app_bolle.py

      - name: Compila cerca_bolle (CLI)
        run: >
          pyinstaller --onedir --noconfirm --name cerca_bolle
          cerca_bolle.py

      - name: Assembla il pacchetto
        shell: pwsh
        run: |
          $out = "dist\ArchivioBolle"
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          Copy-Item -Recurse -Force "dist\ArchivioBolleWeb" "$out\web"
          Copy-Item -Recurse -Force "dist\cerca_bolle" "$out\cli"
          Copy-Item -Recurse -Force "C:\Program Files\Tesseract-OCR" "$out\web\tesseract"
          Copy-Item -Recurse -Force "C:\Program Files\Tesseract-OCR" "$out\cli\tesseract"
          Copy-Item "README.md" "$out\README.md"

      - name: Collaudo reale del pacchetto (crea utente + avvia il server)
        shell: pwsh
        run: |
          Set-Location "dist\ArchivioBolle"

          & ".\cli\cerca_bolle.exe" utente lista
          if ($LASTEXITCODE -ne 0) { throw "cerca_bolle.exe (utente lista) ha fallito" }

          "provaprova1`nprovaprova1`n" | & ".\cli\cerca_bolle.exe" utente aggiungi collaudo
          if ($LASTEXITCODE -ne 0) { throw "cerca_bolle.exe (utente aggiungi) ha fallito" }
          & ".\cli\cerca_bolle.exe" utente lista

          $proc = Start-Process -FilePath ".\web\ArchivioBolleWeb.exe" -PassThru -WindowStyle Hidden
          try {
            $cred = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("collaudo:provaprova1"))
            $ok = $false
            for ($i = 0; $i -lt 20; $i++) {
              Start-Sleep -Seconds 2
              try {
                $r = Invoke-WebRequest -Uri "http://127.0.0.1:8000/api/stato" `
                     -Headers @{Authorization = "Basic $cred"} -UseBasicParsing -TimeoutSec 5
                if ($r.StatusCode -eq 200) { $ok = $true; Write-Host "Risposta server: $($r.Content)"; break }
              } catch { }
            }
            if (-not $ok) { throw "ArchivioBolleWeb.exe non ha risposto correttamente entro il timeout" }

            $senzaCred = $false
            try {
              Invoke-WebRequest -Uri "http://127.0.0.1:8000/api/stato" -UseBasicParsing -TimeoutSec 5 | Out-Null
            } catch {
              if ($_.Exception.Response.StatusCode.value__ -eq 401) { $senzaCred = $true }
            }
            if (-not $senzaCred) { throw "l'endpoint ha risposto anche senza credenziali: autenticazione non attiva" }
          } finally {
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
          }

          Remove-Item "bolle.db" -Force
          Remove-Item -Recurse -Force "archivio_bolle" -ErrorAction SilentlyContinue

      - uses: actions/upload-artifact@v4
        with:
          name: ArchivioBolle-Windows
          path: dist/ArchivioBolle
          retention-days: 90
